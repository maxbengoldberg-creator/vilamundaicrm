<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vila Mundaí CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<style>
:root{
  --bg:#0a0c0f;--bg-2:#0f1216;--surf:#15191e;--surf-2:#1a1f25;--surf-3:#20262d;
  --line:#262c34;--line-2:#323a44;--line-3:#3d4651;
  --txt:#e7eaee;--txt-2:#9aa3ae;--txt-3:#646d78;
  --blue:#4f8ff7;--blue-2:#3d7de6;--blue-soft:#16243d;--blue-pale:#a9c9ff;
  --green:#34d399;--green-soft:#10291f;--red:#f87171;--red-soft:#2b1414;
  --amber:#fbbf24;--amber-soft:#2a2110;--purple:#9b87f5;--purple-soft:#1d1830;
  --teal:#2dd4bf;--wa:#25d366;
  --r:8px;--r-lg:12px;--r-xl:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
h1,h2,h3{font-weight:700;letter-spacing:-.02em;color:#fff;line-height:1.2}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--txt)}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px}
::placeholder{color:var(--txt-3)}

/* LOGIN */
#login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 20%,#11233f,transparent 55%),radial-gradient(circle at 80% 80%,#0d1f1a,transparent 55%),var(--bg)}
.lb{width:100%;max-width:400px;padding:40px}
.lb-logo{display:flex;align-items:center;gap:13px;margin-bottom:36px}
.zig{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--blue),#6aa6ff);display:grid;place-items:center;color:#fff;font-size:22px}
.lb-logo b{font-size:20px;color:#fff;display:block}
.lb-logo span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-weight:700}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;height:44px;border:1px solid var(--line-2);border-radius:var(--r);padding:0 13px;background:var(--surf);color:var(--txt)}
.fld textarea{height:auto;padding:11px 13px;resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.btn-blue{width:100%;height:46px;background:var(--blue);color:#fff;border-radius:var(--r);font-weight:700;font-size:15px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-blue:hover{background:var(--blue-2)}

/* SHELL */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:grid;grid-template-columns:80px 1fr;height:100vh}
.rail{background:var(--bg-2);border-right:1px solid var(--line-2);display:flex;flex-direction:column;align-items:center;padding:14px 0 10px;gap:3px}
.rail .top-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--blue),#6aa6ff);display:grid;place-items:center;color:#fff;font-size:20px;margin-bottom:8px}
.rail .ws{width:36px;height:36px;border-radius:50%;background:var(--surf-3);display:grid;place-items:center;font-weight:700;font-size:14px;margin-bottom:12px;border:1px solid var(--line-2)}
.ri{width:64px;padding:8px 0 6px;border-radius:11px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--txt-2);font-size:20px;transition:.13s;cursor:pointer;position:relative}
.ri .lb2{font-size:9.5px;font-weight:600;text-align:center;color:inherit;line-height:1.1}
.ri:hover{background:var(--surf-2);color:var(--txt)}
.ri.active{color:var(--blue);background:var(--surf)}
.ri.active::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:26px;background:var(--blue);border-radius:0 3px 3px 0}
.ri .bdg{position:absolute;top:3px;right:11px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:20px;min-width:15px;height:15px;display:grid;place-items:center;padding:0 3px}
.rail .sp{flex:1}
.main{overflow-y:auto;background:var(--bg)}

/* BUTTONS */
.btn{height:38px;padding:0 14px;border-radius:9px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.15s;border:1px solid transparent}
.btn i{font-size:17px}
.btn.blue{background:var(--blue-pale);color:#0a1730}.btn.blue:hover{background:#bcd5ff}
.btn.blue-s{background:var(--blue);color:#fff}.btn.blue-s:hover{background:var(--blue-2)}
.btn.ghost{background:var(--surf);border-color:var(--line-2);color:var(--txt)}.btn.ghost:hover{border-color:var(--line-3)}
.btn.sm{height:32px;padding:0 11px;font-size:12px}
.ibtn{height:38px;padding:0 13px;border-radius:9px;background:var(--surf);border:1px solid var(--line-2);color:var(--txt);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.13s}
.ibtn:hover{border-color:var(--line-3)}
.ibtn i{font-size:17px;color:var(--txt-2)}

/* VIEWS */
.view{display:none}.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.head{padding:22px 28px 0;display:flex;align-items:flex-start;gap:14px}
.head h1{font-size:25px}.head .sub{font-size:13px;color:var(--txt-2);margin-top:3px}
.head .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.pad{padding:20px 28px 60px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r-lg)}
.cpad{padding:18px 20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:960px){.g2{grid-template-columns:1fr}}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.tag.blue{background:var(--blue-soft);color:#7fb0ff}
.tag.green{background:var(--green-soft);color:var(--green)}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tag.purple{background:var(--purple-soft);color:var(--purple)}
.tag.gray{background:var(--surf-3);color:var(--txt-2)}
.tag.dot::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px}
.kpi .kt{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi .kt b{font-size:13.5px;color:var(--txt);font-weight:600}
.kpi .kv .v{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.03em}
.kpi .kv .v small{font-size:12px;color:var(--txt-2);font-weight:500;display:block;margin-top:2px}

/* KANBAN */
.pipe-wrap{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 0px)}
.pipe-side{border-right:1px solid var(--line);padding:16px;background:var(--bg-2);overflow-y:auto}
.pipe-main{overflow:hidden;display:flex;flex-direction:column}
.kanban{display:flex;gap:13px;overflow-x:auto;padding:6px 28px 20px;flex:1}
.col-k{flex:0 0 285px;background:var(--surf);border:1px solid var(--line);border-radius:var(--r-lg);display:flex;flex-direction:column;max-height:calc(100vh - 200px)}
.col-k .ch{padding:12px 14px;border-bottom:1px solid var(--line)}
.col-k .ch .t1{display:flex;align-items:center;gap:7px}
.col-k .ch .dt{width:10px;height:10px;border-radius:50%}
.col-k .ch h4{font-size:13.5px;font-weight:700;color:#fff;flex:1}
.col-k .ch .sub{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt-2);margin-top:6px}
.col-k .ch .sub b{color:var(--txt)}
.col-k .cb{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;min-height:50px}
.col-k .nb{padding:11px;border-top:1px solid var(--line);color:var(--txt-2);font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:.1s}
.col-k .nb:hover{color:var(--blue)}
.biz{background:var(--surf-2);border:1px solid var(--line-2);border-radius:9px;padding:12px;cursor:grab;transition:.12s}
.biz:hover{border-color:var(--blue)}
.biz.drag{opacity:.4}
.biz .bh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.biz .av{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.biz .nm{font-size:13px;font-weight:700;color:#fff}
.biz .ph{font-size:11px;color:var(--txt-3)}
.biz .meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.biz .ft{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt-2);border-top:1px solid var(--line);padding-top:8px}
.biz .ft .vl{margin-left:auto;font-weight:700;color:var(--green)}
.col-k.over{outline:2px dashed var(--blue);outline-offset:-2px}
.new-col{flex:0 0 200px;border:1.5px dashed var(--line-2);border-radius:var(--r-lg);height:80px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--txt-2);font-weight:600;font-size:13px;cursor:pointer;transition:.12s}
.new-col:hover{border-color:var(--blue);color:var(--blue)}
.pl-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt-2);cursor:pointer;transition:.1s;margin-bottom:3px}
.pl-item:hover{background:var(--surf)}.pl-item.active{background:var(--surf-2);color:#fff}
.pl-item i{font-size:15px;color:var(--blue)}

/* TABLE */
.tbl-card{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surf)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt-3);font-weight:700;padding:12px 15px;border-bottom:1px solid var(--line);background:var(--bg-2)}
.tbl td{padding:13px 15px;border-bottom:1px solid var(--line);font-size:13px;color:var(--txt)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:.1s;cursor:pointer}.tbl tbody tr:hover td{background:var(--surf-2)}
.av{width:33px;height:33px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px}
.ucell{display:flex;align-items:center;gap:10px}
.ucell b{font-size:13px;font-weight:700;color:#fff}
.ucell small{font-size:11px;color:var(--txt-3);display:block}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:300px 1fr 270px;height:100vh}
@media(max-width:1200px){.chat-layout{grid-template-columns:280px 1fr}.chat-info-panel{display:none}}
.cl-list{border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--bg-2);overflow:hidden}
.cl-top{padding:12px 14px;border-bottom:1px solid var(--line)}
.cl-sr{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--line-2);border-radius:8px;padding:0 11px;height:36px}
.cl-sr input{flex:1;background:none;border:none}
.cl-sr i{color:var(--txt-3);font-size:17px}
.cl-convs{flex:1;overflow-y:auto}
.cv{display:flex;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:.1s}
.cv:hover{background:var(--surf)}.cv.active{background:rgba(79,143,247,.18);border-left:3px solid var(--blue)}.cv.active .cn b{color:#fff}.cv.active .pv{color:var(--txt)}
.cv .cav{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;position:relative}
.cv .cav .wa{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--wa);border-radius:50%;border:2px solid var(--bg-2);display:grid;place-items:center;color:#fff;font-size:7px}
.cv .cc{flex:1;min-width:0}
.cv .cn{display:flex;align-items:center;gap:5px}
.cv .cn b{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cv .cn small{margin-left:auto;font-size:10px;color:var(--txt-3);white-space:nowrap}
.cv .pv{font-size:11.5px;color:var(--txt-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-main{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.cm-head{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;background:var(--bg-2)}
.cm-head .cav{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.cm-head b{font-size:14px;color:#fff}
.cm-head small{font-size:11px;color:var(--txt-3)}
.cm-head .ha{margin-left:auto;display:flex;align-items:center;gap:9px}
.finish-btn{height:32px;padding:0 13px;border-radius:8px;border:1px solid var(--green);color:var(--green);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:5px}
.cm-body{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:62%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-line}
.msg small{display:block;font-size:10px;margin-top:4px;color:var(--txt-3)}
.msg.in{align-self:flex-start;background:var(--surf-2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.bot{align-self:flex-end;background:var(--blue-soft);border:1px solid #233859;border-bottom-right-radius:4px}
.msg.bot .bm{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--blue);margin-bottom:5px}
.msg.bot .rb{width:16px;height:16px;border-radius:4px;background:var(--purple);display:grid;place-items:center;color:#fff;font-size:10px}
.msg.out{align-self:flex-end;background:var(--surf-2);border:1px solid var(--line-2);border-bottom-right-radius:4px}
.day-sep{align-self:center;background:var(--surf-2);color:var(--txt-3);font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;margin:4px 0}
.cm-foot{padding:12px 18px;border-top:1px solid var(--line);background:var(--bg-2)}
.cm-input{display:flex;align-items:center;gap:8px}
.cm-input .box{flex:1;display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--line-2);border-radius:9px;padding:0 11px;height:42px}
.cm-input .box input{flex:1;background:none;border:none}
.cm-input .ti2{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--txt-2);font-size:18px}
.cm-input .ti2:hover{background:var(--surf);color:var(--txt)}
.chat-info-panel{border-left:1px solid var(--line);background:var(--bg-2);padding:20px 16px;overflow-y:auto;text-align:center}
.ci-av{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:22px;margin:0 auto 10px}
.info-blk{border-top:1px solid var(--line);padding:12px 0;text-align:left}
.info-blk .il2{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--txt-3);font-weight:700;margin-bottom:8px}
.irow{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0}
.irow span{color:var(--txt-2)}.irow b{color:#fff}

/* AUTOMATIONS */
.auto-layout{display:grid;grid-template-columns:280px 1fr;height:100vh}
.auto-side{border-right:1px solid var(--line);background:var(--bg-2);display:flex;flex-direction:column;overflow:hidden}
.auto-side .ash{padding:16px;border-bottom:1px solid var(--line)}
.auto-list{flex:1;overflow-y:auto;padding:8px 10px}
.al-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:.1s;margin-bottom:2px}
.al-item:hover{background:var(--surf)}.al-item.active{background:var(--surf-2)}
.al-item .gi{font-size:15px;color:var(--txt-3)}
.al-item .nm{flex:1;font-size:12.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-item .pw2.on{color:var(--green)}.al-item .pw2.off{color:var(--txt-3)}
.auto-main{overflow-y:auto;padding:24px 28px}
.flow-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:18px}
.fc{background:var(--surf);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;transition:.13s}
.fc:hover{border-color:var(--line-3)}
.fc .thumb{height:140px;background:var(--bg-2);border-bottom:1px solid var(--line);position:relative;overflow:hidden;padding:12px}
.fc .ttl{padding:14px 16px;flex:1}
.fc .ttl b{font-size:15px;color:#fff;display:block;margin-bottom:4px}
.fc .ttl p{font-size:12px;color:var(--txt-2);line-height:1.5}
.fc .fa{padding:0 16px 14px}
.fc .open{width:100%;height:38px;border:1px solid var(--blue);color:var(--blue);border-radius:8px;font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px;transition:.12s}
.fc .open:hover{background:var(--blue-soft)}
.fc.create{border:1px dashed var(--line-2)}
.fc.create .ci{padding:20px 18px;display:flex;flex-direction:column;height:100%}
.fc.create h3{font-size:17px;margin-bottom:7px}
.fc.create p{font-size:12.5px;color:var(--txt-2);line-height:1.55;flex:1}
.mini-node{position:absolute;background:var(--surf-2);border:1px solid var(--line-2);border-radius:5px;padding:4px 7px;font-size:8px;color:var(--txt-2);display:flex;align-items:center;gap:3px}
.mini-line{position:absolute;background:var(--line-2)}

/* AGENT BUILDER */
.builder{display:grid;grid-template-columns:340px 1fr;height:100vh}
.bld-side{border-right:1px solid var(--line);background:var(--bg-2);display:flex;flex-direction:column;overflow:hidden}
.bld-side .bsh{padding:16px;border-bottom:1px solid var(--line)}
.bld-side .bk{display:flex;align-items:center;gap:7px;color:var(--txt-2);font-size:12.5px;font-weight:600;cursor:pointer;margin-bottom:12px}
.bld-side .bk:hover{color:var(--txt)}
.prompt-panel{flex:1;overflow-y:auto;padding:16px}
.pp-card{background:linear-gradient(150deg,#172a4d,#101824);border:1px solid #25406b;border-radius:13px;padding:15px;margin-bottom:14px}
.pp-card .pt{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.pp-card .pt .rb{width:28px;height:28px;border-radius:8px;background:var(--purple);display:grid;place-items:center;color:#fff;font-size:16px}
.pp-card .pt b{font-size:14px;color:#fff}
.pp-card p{font-size:12px;color:#9db4d6;line-height:1.5;margin-bottom:11px}
.pp-input{background:rgba(0,0,0,.3);border:1px solid #2a456e;border-radius:9px;padding:11px}
.pp-input textarea{width:100%;background:none;border:none;color:#fff;font-size:13px;resize:none;min-height:90px;line-height:1.55}
.pp-input textarea:focus{outline:none}
.pp-gen{width:100%;height:40px;margin-top:10px;background:linear-gradient(135deg,var(--blue),#6aa6ff);color:#fff;border-radius:9px;font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.pp-gen:hover{filter:brightness(1.08)}
.pp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pp-chips .c{font-size:11px;background:rgba(255,255,255,.06);border:1px solid #2a456e;color:#9db4d6;border-radius:20px;padding:5px 10px;cursor:pointer;transition:.1s}
.pp-chips .c:hover{background:rgba(255,255,255,.12);color:#fff}
.palette{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.pal{display:flex;align-items:center;gap:7px;padding:9px;border:1px solid var(--line-2);border-radius:8px;background:var(--surf);font-size:11.5px;font-weight:600;color:var(--txt);cursor:pointer;transition:.1s}
.pal:hover{border-color:var(--blue)}
.pal i{font-size:17px}
.bld-canvas{position:relative;overflow:auto;background:var(--bg);background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:26px 26px;padding:36px}
.canvas-top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:11px;margin:-36px -36px 22px;padding:12px 28px;background:rgba(10,12,15,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.canvas-top .nm{font-size:15px;font-weight:700;color:#fff}
.canvas-top .right{margin-left:auto;display:flex;gap:9px}
.flow{display:flex;flex-direction:column;align-items:center;max-width:540px;margin:0 auto;padding-bottom:60px}
.node{width:100%;background:var(--surf);border:1px solid var(--line-2);border-radius:12px;overflow:hidden;transition:.15s;opacity:0;animation:nodein .4s forwards}
@keyframes nodein{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.node:hover{border-color:var(--blue)}
.node .nh{display:flex;align-items:center;gap:10px;padding:12px 14px}
.node .nh .ic{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:19px;color:#fff;flex-shrink:0}
.node .nh .nt{flex:1}
.node .nh .nt .k{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.node .nh .nt b{display:block;font-size:13.5px;color:#fff;margin-top:1px}
.node .nh .ed{color:var(--txt-3);font-size:16px;cursor:pointer}
.node .nbody{padding:0 14px 12px;font-size:12px;color:var(--txt-2);line-height:1.5}
.node .nbody .bub{background:var(--bg-2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;margin-top:3px;color:var(--txt);white-space:pre-line}
.n-trigger .ic{background:var(--green)}.n-trigger .k{color:var(--green)}
.n-msg .ic{background:var(--blue)}.n-msg .k{color:var(--blue)}
.n-cond .ic{background:var(--amber)}.n-cond .k{color:var(--amber)}
.n-ia .ic{background:var(--purple)}.n-ia .k{color:var(--purple)}
.n-acao .ic,.n-pms .ic{background:var(--teal)}.n-acao .k,.n-pms .k{color:var(--teal)}
.n-extrai .ic{background:var(--purple)}.n-extrai .k{color:var(--purple)}
.n-fim .ic{background:var(--txt-3)}.n-fim .k{color:var(--txt-3)}
.connector{width:2px;height:26px;background:var(--line-3);position:relative}
.connector::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--line-3)}
.branch{display:flex;gap:40px;justify-content:center;width:100%;position:relative}
.branch::before{content:'';position:absolute;top:-26px;left:25%;right:25%;height:2px;background:var(--line-3)}
.branch-col{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.branch-col::before{content:'';position:absolute;top:-26px;width:2px;height:26px;background:var(--line-3)}
.branch-lbl{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:5px;margin-bottom:9px}
.add-step{width:30px;height:30px;border-radius:50%;border:1.5px dashed var(--line-3);background:var(--surf);color:var(--txt-2);display:grid;place-items:center;font-size:16px;margin:8px 0;transition:.12s}
.add-step:hover{border-color:var(--blue);color:var(--blue)}
.gen-status{display:none;align-items:center;gap:9px;justify-content:center;padding:12px;color:var(--blue);font-size:13px;font-weight:600}
.gen-status.show{display:flex}
.gen-status .sp{width:15px;height:15px;border:2px solid var(--blue-soft);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONFIG */
.switch{width:36px;height:20px;border-radius:20px;background:var(--green);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.switch.off{background:var(--line-3)}
.switch::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;left:18px}
.switch.off::after{left:2px}
.integ{display:flex;align-items:center;gap:14px;padding:14px 17px;border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surf);margin-bottom:11px}
.integ .lg{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:22px;color:#fff;flex-shrink:0}
.integ .id{flex:1}
.integ .id b{font-size:14px;color:#fff;display:block}
.integ .id span{font-size:12px;color:var(--txt-2)}
.strack{position:relative;height:9px;background:var(--surf-3);border-radius:20px;margin:32px 0 13px}
.sfill{position:absolute;left:0;top:0;bottom:0;border-radius:20px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.sknob{position:absolute;top:50%;width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--blue);transform:translate(-50%,-50%);cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.sval{position:absolute;top:-30px;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:7px}

/* MODAL + TOAST */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:22px}
.modal-bg.show{display:flex;animation:fade .2s}
.modal{background:var(--surf);border:1px solid var(--line-2);border-radius:var(--r-xl);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-h{padding:20px 22px 0;display:flex;align-items:flex-start;gap:13px}
.modal-h .ic{width:42px;height:42px;border-radius:11px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-size:21px}
.modal-h h3{font-size:18px}.modal-h p{font-size:12.5px;color:var(--txt-2);margin-top:2px}
.modal-h .x{margin-left:auto;font-size:20px;color:var(--txt-3);cursor:pointer}
.modal-b{padding:16px 22px 22px}
.modal-foot{padding:0 22px 22px;display:flex;gap:9px;justify-content:flex-end}
.fr{display:flex;gap:11px}.fr .fld{flex:1}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--txt-3);gap:10px;font-size:13px}
.loading .sp{width:18px;height:18px;border:2px solid var(--line-2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--surf-3);border:1px solid var(--line-3);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:9px;z-index:300;transition:.3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:var(--green);font-size:19px}
.support{position:fixed;bottom:20px;right:20px;background:var(--blue-pale);color:#0a1730;font-weight:700;font-size:12.5px;padding:9px 14px;border-radius:9px;display:flex;align-items:center;gap:6px;z-index:90}
</style>
</head>
<body>

<div id="login">
  <div class="lb">
    <div class="lb-logo"><div class="zig"><i class="ti ti-brand-zapier"></i></div><div><b>Vila Mundaí</b><span>CRM</span></div></div>
    <h1 style="font-size:24px;margin-bottom:5px">Entrar no painel</h1>
    <p style="color:var(--txt-2);margin-bottom:22px;font-size:13.5px">Atendimento, funil e automações com IA.</p>
    <div class="fld"><label>E-mail</label><input id="liEmail" value="gestor@vilamundai.com.br"></div>
    <div class="fld"><label>Senha</label><input id="liPass" type="password" value="••••••••"></div>
    <button class="btn-blue" onclick="doLogin()"><i class="ti ti-login-2"></i> Entrar</button>
  </div>
</div>

<div id="app">
  <div class="shell">
    <nav class="rail" id="rail"></nav>
    <main class="main" id="main"></main>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalC"></div></div>
<div class="toast" id="toast"><i class="ti ti-circle-check"></i><span id="toastMsg"></span></div>
<div class="support" style="display:none" id="support"><i class="ti ti-headset"></i> Suporte</div>

<script>
/* ============================================================
   CONFIGURAÇÃO DA API
   ============================================================ */
const API_URL = window.location.origin;
const API_KEY = 'vilamundai2024secreto';

async function api(method, path, body) {
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API_URL + path, opts);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  } catch (e) {
    console.error('[api]', method, path, e.message);
    throw e;
  }
}
const GET = p => api('GET', p);
const POST = (p, b) => api('POST', p, b);
const PATCH = (p, b) => api('PATCH', p, b);

/* ============================================================
   HELPERS
   ============================================================ */
const AVC = ['#4f8ff7','#34d399','#fbbf24','#f87171','#9b87f5','#2dd4bf','#f472b6','#fb923c'];
function initials(n){return(n||'?').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function avColor(n){let s=0;for(const c of(n||''))s+=c.charCodeAt(0);return AVC[s%AVC.length]}
function brl(v){return v?Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'—'}
function toast(m,ok=true){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=m;t.querySelector('i').className=ok?'ti ti-circle-check':'ti ti-alert-triangle';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function openModal(h){document.getElementById('modalC').innerHTML=h;document.getElementById('modalBg').classList.add('show')}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});
function loading(){return `<div class="loading"><span class="sp"></span> Carregando…</div>`}

/* ============================================================
   ESTADO
   ============================================================ */
const COLS=[
  {id:'qualif',nome:'Qualificação',cor:'#4f8ff7'},
  {id:'apres',nome:'Apresentação',cor:'#9b87f5'},
  {id:'quente',nome:'Lead Quente',cor:'#fbbf24'},
  {id:'negociacao',nome:'Negociação',cor:'#fb923c'},
  {id:'contrato',nome:'Contrato',cor:'#2dd4bf'},
  {id:'assinatura',nome:'Assinatura',cor:'#22d3ee'},
  {id:'pagamento',nome:'Pagamento',cor:'#a78bfa'},
  {id:'ganho',nome:'Ganho',cor:'#34d399'},
  {id:'sem_datas',nome:'Sem datas',cor:'#94a3b8'},
  {id:'segunda_tentativa',nome:'Segunda tentativa',cor:'#f472b6'},
  {id:'reveillon',nome:'Reveillon',cor:'#facc15'},
  {id:'morno',nome:'Morno',cor:'#64748b'},
  {id:'frio',nome:'Lead Frio',cor:'#38bdf8'},
];
const S={view:'dashboard',activeConv:null,convs:[],leads:[],clientes:[],autos:[],msgs:[],drag:null,automPct:75,bNodes:[],bName:'Nova automação',robotOn:true,chatPoll:null,_msgSig:'',_convSig:''};

/* ============================================================
   NAVEGAÇÃO
   ============================================================ */
const NAV=[
  {id:'dashboard',ic:'ti-layout-grid',nm:'Painel'},
  {id:'pipelines',ic:'ti-filter',nm:'Funil'},
  {id:'leads',ic:'ti-users',nm:'Leads'},
  {id:'clientes',ic:'ti-user-check',nm:'Clientes'},
  {id:'automations',ic:'ti-git-fork',nm:'Fluxos'},
  {id:'chat',ic:'ti-message-circle',nm:'Atendimentos'},
  {id:'gerente',ic:'ti-brain',nm:'Gerente'},
  {id:'lab',ic:'ti-test-pipe',nm:'Laboratório'},
  {id:'agente',ic:'ti-sparkles',nm:'Agente'},
];
const NAV2=[
  {id:'config',ic:'ti-settings',nm:'Config'},
];
function railItem(n){return `<div class="ri ${S.view===n.id?'active':''}" onclick="go('${n.id}')"><i class="ti ${n.ic}"></i>${n.bdg?`<span class="bdg">${n.bdg}</span>`:''}<span class="lb2">${n.nm}</span></div>`}
function renderRail(){document.getElementById('rail').innerHTML=`<div class="top-logo"><i class="ti ti-brand-zapier"></i></div><div class="ws">V</div>${NAV.map(railItem).join('')}<div class="sp"></div>${NAV2.map(railItem).join('')}`}

async function go(v){stopChatPoll();S.view=v;renderRail();document.getElementById('main').innerHTML=loading();document.getElementById('main').scrollTop=0;await renderMain()}

/* ============================================================
   RENDER ROUTER
   ============================================================ */
async function renderMain(){
  const fn={dashboard:vDashboard,pipelines:vPipelines,leads:vLeads,clientes:vClientes,automations:vAutomations,chat:vChat,gerente:vGerente,lab:vLab,agente:vAgente,config:vConfig}[S.view];
  if(fn)await fn();
}

function doLogin(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('support').style.display='flex';
  renderRail();renderMain();
}

/* ============================================================
   DASHBOARD
   ============================================================ */
async function vDashboard(){
  const leads=await GET('/api/v1/leads').catch(()=>[]);
  S.leads=leads;
  const total=leads.length;
  const won=leads.filter(l=>l.stage==='ganho');
  const open=leads.filter(l=>l.stage!=='ganho');
  const vWon=won.reduce((a,l)=>a+Number(l.valor_cotado||0),0);
  const vOpen=open.reduce((a,l)=>a+Number(l.valor_cotado||0),0);
  const custoTotal=leads.reduce((a,l)=>a+Number(l.total_custo_brl||0),0);
  document.getElementById('main').innerHTML=`<div class="view active">
  <div class="head"><div><h1>Dashboard</h1><div class="sub">Desempenho da Vila Mundaí</div></div>
    <div class="right"><button class="btn blue" onclick="go('agente')"><i class="ti ti-sparkles"></i> Pedir à IA</button></div></div>
  <div class="pad">
    <div class="kpis">
      ${kpiH('Total de leads','ti-users',total+' contatos',brl(vWon+vOpen),'#4f8ff7')}
      ${kpiH('Ganhos','ti-trending-up',won.length+' reservas',brl(vWon),'#34d399')}
      ${kpiH('Em aberto','ti-activity',open.length+' leads',brl(vOpen),'#fbbf24')}
      ${kpiH('Custo IA total','ti-currency-dollar',leads.reduce((a,l)=>a+(l.total_tokens_input||0)+(l.total_tokens_output||0),0).toLocaleString('pt-BR')+' tokens',brl(custoTotal),'#9b87f5')}
    </div>
    <div class="g2" style="margin-bottom:16px">
      <div class="card cpad">
        <h2 style="font-size:16px;margin-bottom:14px">Leads por etapa</h2>
        ${COLS.map(c=>{const n=leads.filter(l=>l.stage===c.id).length;return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--txt-2)">${c.nome}</span><b style="color:#fff">${n}</b></div><div style="height:7px;background:var(--surf-3);border-radius:20px;overflow:hidden"><div style="height:100%;width:${total?Math.min((n/total)*100*3,100):0}%;background:${c.cor};border-radius:20px;transition:.5s"></div></div></div>`}).join('')}
      </div>
      <div class="card cpad">
        <h2 style="font-size:16px;margin-bottom:14px">Últimos leads</h2>
        ${leads.slice(0,5).map(l=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">
          <div class="av" style="background:${avColor(l.nome)}">${initials(l.nome)}</div>
          <div style="flex:1"><b style="font-size:13px;color:#fff;display:block">${l.nome||l.phone}</b><span style="font-size:11px;color:var(--txt-3)">${l.phone}</span></div>
          <span class="tag ${l.ai_enabled?'purple':'amber'} dot">${l.ai_enabled?'IA':'Humano'}</span>
        </div>`).join('')||'<div style="color:var(--txt-3);font-size:13px;padding:20px 0;text-align:center">Nenhum lead ainda</div>'}
      </div>
    </div>
  </div></div>`;
}
function kpiH(lbl,ic,sub,val,cor){return `<div class="kpi"><div class="kt"><b>${lbl}</b><i class="ti ${ic}" style="color:${cor};font-size:20px"></i></div><div class="kv"><div class="v">${val}<small>${sub}</small></div></div></div>`}

/* ============================================================
   PIPELINES / KANBAN
   ============================================================ */
async function vPipelines(){
  const leads=await GET('/api/v1/leads').catch(()=>[]);
  S.leads=leads;
  S.selFrio=new Set(); // seleção de leads frios para exclusão em massa
  document.getElementById('main').innerHTML=`<div class="view active" style="height:100vh">
  <div class="pipe-wrap">
    <div class="pipe-side">
      <button class="btn blue" style="width:100%;justify-content:center;margin-bottom:14px" onclick="toast('Criar novo pipeline')"><i class="ti ti-plus"></i> Novo pipeline</button>
      <div class="pl-item active"><i class="ti ti-filter"></i> Vila Mundaí</div>
    </div>
    <div class="pipe-main">
      <div style="padding:20px 28px 14px;display:flex;align-items:center;gap:14px">
        <div><h1 style="font-size:22px">Vila Mundaí</h1><div style="font-size:12.5px;color:var(--txt-2);margin-top:2px">Funil de vendas</div></div>
        <div style="margin-left:auto;display:flex;gap:9px">
          <button class="ibtn" onclick="toast('Filtros')"><i class="ti ti-adjustments"></i> Filtros</button>
          <button class="btn blue" onclick="modalNovoBiz()"><i class="ti ti-plus"></i> Novo negócio</button>
        </div>
      </div>
      <div class="kanban" id="kanban">
        ${COLS.map(c=>{const bs=leads.filter(l=>l.stage===c.id);const val=bs.reduce((a,l)=>a+Number(l.valor_cotado||0),0);return `
          <div class="col-k" data-col="${c.id}">
            <div class="ch"><div class="t1"><span class="dt" style="background:${c.cor}"></span><h4>${c.nome}</h4></div>
              <div class="sub"><b>${brl(val)}</b><span>${bs.length} negócios</span></div>
              ${c.id==='frio'&&bs.length?`<div style="display:flex;gap:6px;margin-top:9px">
                <button id="frioSelBtn" onclick="selecionarTodosFrio()" style="flex:1;background:var(--surf-3);border:1px solid var(--line-2);border-radius:6px;color:var(--txt-2);font-size:10.5px;font-weight:700;padding:5px 0;cursor:pointer;font-family:inherit">Selecionar todos</button>
                <button id="frioDelBtn" onclick="excluirFrioSelecionados()" style="flex:1;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.4);border-radius:6px;color:#f87171;font-size:10.5px;font-weight:700;padding:5px 0;cursor:pointer;font-family:inherit">Excluir (0)</button>
              </div>`:''}</div>
            <div class="cb" data-col="${c.id}">${bs.map(b=>bizCard(b)).join('')}</div>
            <div class="nb" onclick="modalNovoBiz('${c.id}')"><i class="ti ti-plus"></i> Novo negócio</div>
          </div>`}).join('')}
        <div class="new-col" onclick="toast('Nova coluna')"><i class="ti ti-plus"></i> Nova coluna</div>
      </div>
    </div>
  </div></div>`;
  bindKanban();
}
function aiBadgesHtml(id, enabled){
  // IA: verde=ativa, vermelho=desativada
  const iaC=enabled?'#34d399':'#f87171';
  const iaBg=enabled?'rgba(52,211,153,.18)':'rgba(248,113,113,.18)';
  const iaBd=enabled?'rgba(52,211,153,.4)':'rgba(248,113,113,.4)';
  // Humano: amarelo=ativo (ia off), vermelho=desativado (ia on)
  const huC=!enabled?'#fbbf24':'#f87171';
  const huBg=!enabled?'rgba(251,191,36,.18)':'rgba(248,113,113,.18)';
  const huBd=!enabled?'rgba(251,191,36,.4)':'rgba(248,113,113,.4)';
  const tip=enabled?'IA ativa — clique para passar ao humano':'Humano ativo — clique para reativar IA';
  return `<div id="ai-badges-${id}" data-ai="${enabled?1:0}" onclick="event.stopPropagation();toggleAICard(${id})" title="${tip}" style="cursor:pointer;display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0">
    <span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;background:${iaBg};border:1px solid ${iaBd};color:${iaC};line-height:1.7">IA</span>
    <span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;background:${huBg};border:1px solid ${huBd};color:${huC};line-height:1.7">Humano</span>
  </div>`;
}
function bizCard(b){return `<div class="biz" draggable="true" data-id="${b.id}" data-phone="${b.phone}" onclick="modalBiz(${b.id})">
  <div class="bh">${b.stage==='frio'?`<input type="checkbox" class="frio-chk" data-id="${b.id}" ${S.selFrio&&S.selFrio.has(String(b.id))?'checked':''} onclick="event.stopPropagation();toggleFrioSel('${b.id}',this.checked)" title="Selecionar para excluir" style="width:16px;height:16px;cursor:pointer;accent-color:#38bdf8;flex-shrink:0;margin-right:2px">`:''}<div class="av" style="background:${avColor(b.nome)};width:29px;height:29px;font-size:11px">${initials(b.nome)}</div>
    <div style="flex:1;min-width:0"><div class="nm">${b.nome||b.phone}</div><div class="ph">${b.phone}</div></div>

async function verContrato(id,nome){
  toast('Gerando contrato…');
  try{
    const r=await fetch(`${API_URL}/api/v1/leads/${id}/contrato`,{headers:{'x-api-key':API_KEY}});
    if(!r.ok)throw new Error(await r.text());
    const blob=await r.blob();
    const fname=`Contrato Vila Mundai - ${(nome||('lead '+id)).trim()}.pdf`;
    // Chrome/Edge: deixa o CEO escolher a pasta onde salvar o PDF.
    if(window.showSaveFilePicker){
      try{
        const h=await window.showSaveFilePicker({suggestedName:fname,types:[{description:'PDF',accept:{'application/pdf':['.pdf']}}]});
        const w=await h.createWritable();await w.write(blob);await w.close();
        toast('Contrato salvo em PDF');return;
      }catch(e){if(e&&e.name==='AbortError'){return;}/* sem suporte: cai no download abaixo */}
    }
    // Fallback: baixa direto para a pasta de downloads do navegador.
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),60000);
    toast('Contrato baixado em PDF');
  }catch(e){toast('Erro ao gerar contrato',false);console.error(e);}
}

    await POST(`/api/v1/automations/stages/${stage}/draft/promover`,{});

async function salvarStageRascunho(stage){

    await PATCH(`/api/v1/automations/stages/${stage}/draft`,{prompt_draft});
    closeModal();toast('Rascunho salvo — teste no Gerente (simulador com "usar rascunhos")');
    await vAutomations();
  }catch(e){toast('Erro: '+e.message,false)}
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function salvarStage(stage){
  const nome=document.getElementById('esNome')?.value?.trim();
  const descricao=document.getElementById('esDesc')?.value?.trim();

async function vChat(){
  const [convs,robot]=await Promise.all([
    GET('/api/v1/conversations').catch(()=>[]),
    GET('/api/v1/robot/status').catch(()=>({enabled:true})),
  ]);
  S.convs=convs;
  S.robotOn=robot.enabled!==false;
  const vis=visibleConvs();
  if(!S.activeConv&&vis.length)S.activeConv=vis[0].id;
  if(S.activeConv&&!convs.find(c=>sameId(c.id,S.activeConv)))S.activeConv=vis[0]?.id||null;
  let msgs=[];
  if(S.activeConv)msgs=await GET(`/api/v1/conversations/${S.activeConv}/messages`).catch(()=>[]);
  S.msgs=msgs;
  const ac=convs.find(c=>sameId(c.id,S.activeConv))||null;
  document.getElementById('main').innerHTML=`<div class="view active" style="height:100vh">
  <div class="chat-layout">
    <div class="cl-list">
      <div class="cl-top">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:${S.robotOn?'var(--green-soft)':'var(--red-soft)'};border:1px solid ${S.robotOn?'#1c4133':'#3d1c1c'};margin-bottom:10px">
          <i class="ti ti-robot" style="font-size:18px;color:${S.robotOn?'var(--green)':'var(--red)'}"></i>
          <div style="flex:1"><b style="font-size:12.5px;color:#fff;display:block">Agente ${S.robotOn?'ativo':'desligado'}</b><span style="font-size:10.5px;color:var(--txt-2)">${S.robotOn?'respondendo no automático':'sem responder ninguém'}</span></div>
          <span class="switch ${S.robotOn?'':'off'}" onclick="toggleRobotGeral(this)"></span>
        </div>
        <div class="cl-sr"><i class="ti ti-search"></i><input id="chatSearch" placeholder="Buscar nome ou telefone…" value="${(S.chatSearch||'').replace(/"/g,'&quot;')}" oninput="S.chatSearch=this.value;refreshConvList()"></div>
        <select onchange="S.chatFilter=this.value;refreshConvList()" style="width:100%;margin-top:8px;height:34px;background:var(--surf);border:1px solid var(--line-2);border-radius:8px;color:var(--txt);padding:0 9px;font-size:12px;font-family:inherit">
          <option value="todos" ${(S.chatFilter||'todos')==='todos'?'selected':''}>Funil: todos</option>
          ${COLS.map(c=>`<option value="${c.id}" ${S.chatFilter===c.id?'selected':''}>${c.nome}</option>`).join('')}
        </select>
      </div>
      <div class="cl-convs" id="clConvs">${convListHTML()}</div>
    </div>
    <div class="chat-main">
      <div class="cm-head" id="cmHead" style="${ac?'':'display:none'}">${headHTML(ac)}</div>
      <div class="cm-body" id="cmBody">${ac?msgsBodyHTML(msgs):'<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--txt-3)">Selecione uma conversa</div>'}</div>
      <div class="cm-foot" style="${ac?'':'display:none'}">
        <div class="cm-input">
          <div class="tools"><span class="ti2"><i class="ti ti-robot"></i></span></div>
          <div class="box"><input placeholder="Digite para enviar manualmente…" id="cmInput" onkeydown="if(event.key==='Enter')sendMsg()"><i class="ti ti-mood-smile" style="color:var(--txt-3)"></i></div>
          <button class="btn blue-s" onclick="sendMsg()"><i class="ti ti-send-2"></i></button>
        </div>
      </div>
    </div>
    <div class="chat-info-panel" id="chatInfo">${fichaHTML(ac)}</div>
  </div></div>`;
  if(ac){const b=document.getElementById('cmBody');if(b)b.scrollTop=b.scrollHeight;}
  S._convSig=convSig(convs);S._msgSig=msgSig(msgs);S._fichaSig=ac?fichaSig(ac):'';
  if(ac){
    POST(`/api/v1/conversations/${ac.id}/read`,{}).catch(()=>null);
    ac.unread=0;
    loadResumo(ac.id);
  }
  startChatPoll();
}
/* ---- lista de conversas: filtro, busca e ordenação por pendência ---- */
function sameId(a,b){return String(a)===String(b)}
function aguardandoHumano(c){return Number(c.unread)>0&&(!c.ai_enabled||!S.robotOn)}
function visibleConvs(){
  const q=(S.chatSearch||'').toLowerCase().trim();
  const f=S.chatFilter||'todos';
  return (S.convs||[])
    .filter(c=>f==='todos'||c.stage===f)
    .filter(c=>!q||String(c.nome||'').toLowerCase().includes(q)||String(c.phone||'').includes(q))
    .sort((a,b)=>{
      const ag=(aguardandoHumano(b)?1:0)-(aguardandoHumano(a)?1:0);if(ag)return ag;
      const un=Number(b.unread||0)-Number(a.unread||0);if(un)return un;
      return new Date(b.last_at)-new Date(a.last_at);
    });
}
function convItemHTML(c){
  const st=COLS.find(x=>x.id===c.stage);
  const un=Number(c.unread||0);
  const ag=aguardandoHumano(c);
  return `<div class="cv ${sameId(c.id,S.activeConv)?'active':''}" data-id="${c.id}" onclick="openConv(${c.id})">
  <div class="cav" style="background:${avColor(c.nome||c.phone)}">${initials(c.nome||c.phone)}<span class="wa"><i class="ti ti-brand-whatsapp"></i></span></div>
  <div class="cc">
    <div class="cn"><b style="${un?'color:#fff':''}">${c.nome||c.phone}</b>
      ${un?`<span style="background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;border-radius:10px;padding:1px 6px;flex-shrink:0">${un}</span>`:''}
      <small>${new Date(c.last_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</small></div>
    <div class="pv" style="${un?'color:var(--txt);font-weight:600':''}">${c.last_message||'…'}</div>
    <div style="margin-top:4px;display:flex;gap:4px;align-items:center;flex-wrap:wrap">
      ${st?`<span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;background:${st.cor}22;border:1px solid ${st.cor}55;color:${st.cor};line-height:1.7">${st.nome}</span>`:''}
      ${ag?`<span style="font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(251,146,60,.18);border:1px solid rgba(251,146,60,.45);color:#fb923c;line-height:1.7">AGUARDANDO HUMANO</span>`:''}
    </div>
  </div>
</div>`}
function convListHTML(){
  const vis=visibleConvs();
  return vis.length?vis.map(convItemHTML).join(''):`<div style="color:var(--txt-3);font-size:12.5px;text-align:center;padding:40px">Nenhuma conversa${(S.chatSearch||S.chatFilter&&S.chatFilter!=='todos')?' com esse filtro':' ainda'}.</div>`;
}
function refreshConvList(){const el=document.getElementById('clConvs');if(el)el.innerHTML=convListHTML()}
/* ---- cabeçalho e ficha do lead ---- */
function chatAiBadges(c){
  if(!c||!c.lead_id)return '';
  const on=!!c.ai_enabled;
  const iaC=on?'#34d399':'#f87171',iaBg=on?'rgba(52,211,153,.18)':'rgba(248,113,113,.18)',iaBd=on?'rgba(52,211,153,.4)':'rgba(248,113,113,.4)';
  const huC=!on?'#fbbf24':'#f87171',huBg=!on?'rgba(251,191,36,.18)':'rgba(248,113,113,.18)',huBd=!on?'rgba(251,191,36,.4)':'rgba(248,113,113,.4)';
  return `<span onclick="toggleAIChat(${c.lead_id})" title="${on?'IA ativa — clique para passar ao humano':'Humano ativo — clique para reativar a IA'}" style="cursor:pointer;display:inline-flex;gap:4px;vertical-align:middle">
    <span style="font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:4px;background:${iaBg};border:1px solid ${iaBd};color:${iaC}">IA</span>
    <span style="font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:4px;background:${huBg};border:1px solid ${huBd};color:${huC}">HUMANO</span>
  </span>`;
}
function headHTML(c){
  if(!c)return '';
  return `<div class="cav" style="background:${avColor(c.nome||c.phone)}">${initials(c.nome||c.phone)}</div>
  <div><b>${c.nome||c.phone}</b><small style="display:block">${c.phone||''}</small></div>
  <div class="ha">${chatAiBadges(c)}
    ${c.lead_id?`<button class="ibtn" onclick="abrirPromptLead(${c.lead_id},'${c.phone}')" title="Enviar instrução ao agente"><i class="ti ti-terminal-2"></i> Instruir</button>`:''}

async function moverLeadChat(leadId,stage){
  if(!leadId)return;

  const passivo=(stage==='frio'||stage==='morno'||stage==='ganho');
  if(passivo)patch.ai_enabled=false;
  try{await PATCH(`/api/v1/leads/${leadId}`,patch)}catch(e){toast(e.message,false);return}
  S.convs.forEach(c=>{if(sameId(c.lead_id,leadId)){c.stage=stage;if(passivo)c.ai_enabled=false}});
  const col=COLS.find(x=>x.id===stage);
  toast('Movido para '+(col?col.nome:stage)+(passivo?' — IA desativada':''));
  const ac=S.convs.find(c=>sameId(c.id,S.activeConv));
  renderChatHead(ac);renderFicha(ac);refreshConvList();
}
async function toggleAIChat(leadId){

  try{await PATCH(`/api/v1/leads/${leadId}/ai`,{ai_enabled:next})}catch(e){toast(e.message,false);return}
  S.convs.forEach(c=>{if(sameId(c.lead_id,leadId))c.ai_enabled=next});

}

/* ---- mensagens ---- */
function msgsBodyHTML(msgs){
  if(!msgs||!msgs.length)return '<div style="color:var(--txt-3);font-size:12.5px;text-align:center;padding:30px">Sem mensagens ainda</div>';
  let h='',lastDay='';
  for(const m of msgs){
    if(!m.content||!String(m.content).trim()||m.content==='[ferramentas]')continue;
    const d=new Date(m.created_at);
    const day=d.toLocaleDateString('pt-BR');
    if(day!==lastDay){lastDay=day;h+=`<div class="day-sep">${dayLabel(d)}</div>`}
    h+=msgHTML(m);
  }
  return h||'<div style="color:var(--txt-3);font-size:12.5px;text-align:center;padding:30px">Sem mensagens ainda</div>';
}
function dayLabel(d){
  const hj=new Date().toLocaleDateString('pt-BR');
  const ot=new Date(Date.now()-864e5).toLocaleDateString('pt-BR');
  const ds=d.toLocaleDateString('pt-BR');
  return ds===hj?'Hoje':ds===ot?'Ontem':ds;
}
function msgHTML(m){
  const hora=new Date(m.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(m.sender==='ia'||m.sender==='bot')return `<div class="msg bot"><div class="bm"><span class="rb"><i class="ti ti-robot"></i></span> Agente IA</div>${m.content||''}<small>${hora}</small></div>`;
  if(m.sender==='humano')return `<div class="msg out"><div class="bm" style="display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--green);margin-bottom:5px"><i class="ti ti-user"></i> Você (humano)</div>${m.content||''}<small>${hora}</small></div>`;
  return `<div class="msg in">${m.content||''}<small>${hora}</small></div>`;
}
/* ---- abrir conversa: atualização IMEDIATA do cabeçalho/ficha (sem esperar rede) ---- */
async function openConv(id){
  if(sameId(S.activeConv,id))return;
  S.activeConv=id;
  const c=S.convs.find(x=>sameId(x.id,id));
  renderChatHead(c);renderFicha(c);
  document.querySelectorAll('#clConvs .cv').forEach(el=>el.classList.toggle('active',sameId(el.dataset.id,id)));
  const foot=document.querySelector('.cm-foot');if(foot)foot.style.display='';
  const b=document.getElementById('cmBody');if(b)b.innerHTML='<div style="color:var(--txt-3);font-size:12.5px;text-align:center;padding:30px">Carregando…</div>';
  S._fichaSig=c?fichaSig(c):'';
  POST(`/api/v1/conversations/${id}/read`,{}).catch(()=>null);
  if(c)c.unread=0;
  refreshConvList();
  loadResumo(id);
  const msgs=await GET(`/api/v1/conversations/${id}/messages`).catch(()=>[]);
  if(!sameId(S.activeConv,id))return;
  S.msgs=msgs;S._msgSig=msgSig(msgs);

async function finishConv(id){

  await POST(`/api/v1/conversations/${id}/finish`).catch(()=>null);

async function sendMsg(){
  const c=S.convs.find(x=>sameId(x.id,S.activeConv));if(!c)return;
  const i=document.getElementById('cmInput');if(!i||!i.value.trim())return;
  const text=i.value.trim();i.value='';
  await POST(`/api/v1/conversations/${c.id}/send`,{text}).catch(e=>toast(e.message,false));
  toast('Mensagem enviada');
  setTimeout(async()=>{
    const msgs=await GET(`/api/v1/conversations/${c.id}/messages`).catch(()=>null);
    if(!msgs||!sameId(S.activeConv,c.id))return;
    S.msgs=msgs;S._msgSig=msgSig(msgs);

function convSig(convs){return (convs||[]).map(c=>`${c.id}:${c.last_at}:${c.last_message}:${c.ai_enabled}:${c.stage}:${c.unread}`).join('|')}
function msgSig(msgs){if(!msgs||!msgs.length)return '0';const l=msgs[msgs.length-1];return `${msgs.length}:${l.created_at}:${l.content}`}
function startChatPoll(){stopChatPoll();S.chatPoll=setInterval(pollChat,4000)}
function stopChatPoll(){if(S.chatPoll){clearInterval(S.chatPoll);S.chatPoll=null}}
/* Atualização automática em tempo real — independe do estado da IA.
   Atualiza lista, mensagens, cabeçalho e ficha sem recriar o input. */
async function pollChat(){
  if(S.view!=='chat'){stopChatPoll();return}
  if(document.hidden)return;
  let convs;
  try{convs=await GET('/api/v1/conversations')}catch(e){return}
  S.convs=convs;
  const cs=convSig(convs);
  if(cs!==S._convSig){S._convSig=cs;refreshConvList()}
  if(!S.activeConv)return;
  const ac=convs.find(c=>sameId(c.id,S.activeConv));
  if(ac){
    const fs=fichaSig(ac);
    if(fs!==S._fichaSig){S._fichaSig=fs;renderChatHead(ac);renderFicha(ac)}
  }
  let msgs;
  try{msgs=await GET(`/api/v1/conversations/${S.activeConv}/messages`)}catch(e){return}
  const ms=msgSig(msgs);
  if(ms===S._msgSig)return;
  S._msgSig=ms;S.msgs=msgs;
  const b=document.getElementById('cmBody');
  if(!b)return;
  const nearBottom=b.scrollHeight-b.scrollTop-b.clientHeight<140;
  b.innerHTML=msgsBodyHTML(msgs);
  if(nearBottom)b.scrollTop=b.scrollHeight;
  // chegou mensagem nova na conversa aberta: marca como lida
  POST(`/api/v1/conversations/${S.activeConv}/read`,{}).catch(()=>null);
}

function lerRoteiroArquivo(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{const ta=document.getElementById('simRoteiro');if(ta){ta.value=r.result;toast('Diálogo carregado')}};
  r.readAsText(f);
}
async function avaliarCasoReal(){
  const texto=document.getElementById('simRoteiro')?.value?.trim();
  if(!texto){toast('Cole ou suba um diálogo (.txt) primeiro',false);return}
  const nome=document.getElementById('simNome')?.value?.trim()||null;
  toast('Gerente Max avaliando o diálogo real…');
  const r=await POST('/api/v1/gerente/avaliar-caso-real',{texto,nome}).catch(e=>{toast(e.message,false);return null});
  if(!r)return;
  if(!r.ok){toast(r.erro||'não foi possível avaliar',false);return}
  S.sims=await GET('/api/v1/gerente/simulacoes').catch(()=>S.sims);
  const l=document.getElementById('simList');if(l)l.innerHTML=simListHTML();
  mostrarRelatorioModal(r,nome,r.turnos);
}

async function novaSimulacao(){

async function apagarSim(id){
  if(!confirm('Apagar esta simulação?'))return;
  await api('DELETE',`/api/v1/gerente/simulacoes/${id}`).catch(()=>null);
  if(sameId(S.simAtiva,id))S.simAtiva=null;
  S.sims=await GET('/api/v1/gerente/simulacoes').catch(()=>[]);
  await vGerente();
}
async function abrirSim(id){
  const sim=await GET(`/api/v1/gerente/simulacoes/${id}`).catch(()=>null);
  if(!sim)return;
  // Caso real: é uma avaliação de diálogo, não um chat — mostra só a análise.
  if(sim.perfil&&sim.perfil.modo==='caso_real'){
    mostrarRelatorioModal(sim.relatorio||{ok:false,erro:'sem relatório'},sim.nome,(sim.transcript||[]).length);
    return;
  }
  S.simAtiva=id;
  S.simData=sim;
  document.querySelectorAll('#simList .cv').forEach(el=>el.classList.toggle('active',sameId(el.dataset.id,id)));
  const head=document.getElementById('simHead');
  if(head){head.style.display='';head.innerHTML=`<div class="cav" style="background:var(--purple)"><i class="ti ti-flask"></i></div>
    <div><b>${sim.nome||('Simulação #'+sim.id)}</b><small style="display:block">sandbox${sim.usar_draft?' · usando rascunhos':''}${sim.perfil?' · imitando lead real':''}</small></div>

function simRelHTML(r){

  const sec=(t,arr,c)=>!(arr&&arr.length)?'':`<div style="margin-top:8px"><b style="font-size:10px;letter-spacing:.05em;color:${c}">${t}</b><ul style="margin:4px 0 0 14px;padding:0">${arr.map(x=>`<li style="font-size:11px;color:var(--txt-2);line-height:1.5;margin-bottom:3px">${escHtml(x)}</li>`).join('')}</ul></div>`;
  const sugs=(r.sugestoes||[]).map(s=>`<div style="margin-top:7px;padding:8px 10px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;text-align:left">

    <div style="font-size:11px;color:var(--txt-2);margin-top:4px">${escHtml(s.problema||'')}</div>
    <div style="font-size:11px;color:var(--teal);margin-top:4px;white-space:pre-line">${escHtml(s.ajuste_sugerido||'')}</div>

    <div style="display:flex;align-items:center;gap:7px"><span style="font-size:10px;font-weight:700;color:var(--txt-3)">NOTA</span><b style="color:${cor};font-size:16px">${r.nota_geral}/10</b></div>
    ${r.resumo?`<div style="font-size:11.5px;color:var(--txt-2);margin-top:6px;line-height:1.5">${escHtml(r.resumo)}</div>`:''}
    ${sec('ERROS',r.erros,'var(--red)')}

    ${sec('PONTOS FORTES',r.pontos_fortes,'var(--green)')}

  </div>`;
}
async function simEnviar(){
  if(!S.simAtiva)return;
  const i=document.getElementById('simInput');if(!i||!i.value.trim())return;
  const text=i.value.trim();i.value='';
  const tr=(S.simData.transcript=S.simData.transcript||[]);
  tr.push({role:'lead',text,ts:new Date().toISOString()});
  renderSimBody();
  const b=document.getElementById('simBody');
  if(b)b.insertAdjacentHTML('beforeend','<div id="simTyping" style="color:var(--txt-3);font-size:11.5px;padding:4px 8px">Atendente Max digitando…</div>');
  if(b)b.scrollTop=b.scrollHeight;
  const id=S.simAtiva;
  const r=await POST(`/api/v1/gerente/simulacoes/${id}/mensagem`,{text}).catch(e=>{toast(e.message,false);return null});
  document.getElementById('simTyping')?.remove();
  if(!r||!sameId(S.simAtiva,id))return;
  S.simData.transcript=r.transcript;S.simData.lead_json=r.lead;
  renderSimBody();renderSimInfo();
}
async function simAvaliar(){
  if(!S.simAtiva)return;
  const blk=document.getElementById('simRel');
  if(blk)blk.innerHTML='<span style="color:var(--txt-3);font-size:11.5px">Gerente Max analisando a conversa…</span>';
  const r=await POST(`/api/v1/gerente/simulacoes/${S.simAtiva}/avaliar`,{}).catch(e=>({ok:false,erro:e.message}));
  if(S.simData)S.simData.relatorio=r;
  const b2=document.getElementById('simRel');if(b2)b2.innerHTML=simRelHTML(r);
  if(r&&r.ok)toast('Avaliação concluída — sugestões disponíveis também na aba Fluxos');
}
// Um ciclo: a IA-lead escreve (imitando o perfil, se houver) e o Atendente responde.
async function simIaCiclo(){
  if(!S.simAtiva||S.simRodando)return false;
  S.simRodando=true;
  const id=S.simAtiva;
  const b=document.getElementById('simBody');
  if(b){b.insertAdjacentHTML('beforeend','<div id="simTyping" style="color:var(--txt-3);font-size:11.5px;padding:4px 8px">IA-lead escrevendo…</div>');b.scrollTop=b.scrollHeight}
  const r=await POST(`/api/v1/gerente/simulacoes/${id}/lead-ia`,{}).catch(e=>{toast(e.message,false);return null});
  document.getElementById('simTyping')?.remove();
  S.simRodando=false;
  if(!r||!sameId(S.simAtiva,id))return false;
  if(r.fim){toast('IA-lead encerrou a conversa ([FIM]) — hora de avaliar');return false}
  S.simData.transcript=r.transcript;S.simData.lead_json=r.lead;
  renderSimBody();renderSimInfo();
  return true;
}
// Modo automático: ciclos seguidos até [FIM], limite, ou clique em Parar.
async function simAuto(){
  if(S.simAutoOn){S.simAutoOn=false;return}
  S.simAutoOn=true;
  const btn=document.getElementById('btnIaAuto');
  if(btn)btn.innerHTML='<i class="ti ti-player-stop"></i> Parar';
  for(let i=0;i<8&&S.simAutoOn;i++){
    const ok=await simIaCiclo();
    if(!ok)break;
  }
  S.simAutoOn=false;
  const btn2=document.getElementById('btnIaAuto');
  if(btn2)btn2.innerHTML='<i class="ti ti-player-play"></i> Auto';
}

async function gerarFluxo(){
  const p=document.getElementById('bldPrompt')?.value?.trim();
  if(!p){toast('Descreva o objetivo',false);return}
  const salvar=document.getElementById('salvarAuto')?.checked;
  const st=document.getElementById('genStatus');st.classList.add('show');
  document.getElementById('flowCanvas').innerHTML='';
  try{
    const r=await POST('/api/v1/automations/generate',{prompt:p,salvar});
    st.classList.remove('show');
    if(r.flow?.nodes){S.bNodes=r.flow.nodes;renderFlow();toast('Automação gerada'+(salvar?' e salva':' — marque "Salvar no CRM" para persistir'));}
    else{toast('A IA não retornou um fluxo válido',false)}
  }catch(e){st.classList.remove('show');toast('Erro ao gerar: '+e.message,false)}
}
let _dl=0;
function renderFlow(){const c=document.getElementById('flowCanvas');if(!c)return;_dl=0;c.innerHTML=renderNodes(S.bNodes)+`<button class="add-step" onclick="toast('Adicionar bloco')" title="Adicionar"><i class="ti ti-plus"></i></button>`}
function renderNodes(nodes){let h='';nodes.forEach((n,i)=>{if(i>0)h+=`<div class="connector"></div>`;h+=nodeHTML(n);if(n.tipo==='cond'&&n.branches){h+=`<div class="connector"></div><div class="branch">${n.branches.map(br=>`<div class="branch-col"><span class="branch-lbl tag ${br.color==='green'?'green':br.color==='red'?'red':'amber'}">${br.lbl}</span>${renderNodes(br.nodes||[])}</div>`).join('')}</div>`}});return h}
function nodeHTML(n){const m=NODE_META[n.tipo]||NODE_META.msg;_dl+=0.08;const body=n.bub?`<div class="nbody"><div class="bub">${n.bub}</div></div>`:(n.sub?`<div class="nbody">${n.sub}</div>`:'');return `<div class="node ${m.cls}" style="animation-delay:${_dl.toFixed(2)}s"><div class="nh"><div class="ic"><i class="ti ${m.ic}"></i></div><div class="nt"><span class="k">${m.k}</span><b>${n.titulo}</b></div><i class="ti ti-pencil ed" onclick="toast('Editar: ${n.titulo}')"></i></div>${body}</div>`}

        </tr>`).join('')||'<tr><td colspan="8" style="text-align:center;color:var(--txt-3);padding:40px">Nenhum cliente importado. Clique em "Importar do PMS" para buscar as chegadas.</td></tr>'}</tbody>
      </table>
    </div>
  </div></div>`;
}

function modalImportar(){
  const hoje=new Date().toISOString().split('T')[0];
  const em30=new Date(Date.now()+30*864e5).toISOString().split('T')[0];
  openModal(`<div class="modal-h"><div class="ic"><i class="ti ti-download"></i></div><div><h3>Importar chegadas do PMS</h3><p>Busca hóspedes confirmados que fazem check-in no período</p></div><span class="x" onclick="closeModal()"><i class="ti ti-x"></i></span></div>
  <div class="modal-b">
    <div class="fr"><div class="fld"><label>Check-in de</label><input type="date" id="impInicio" value="${hoje}"></div>
      <div class="fld"><label>Até</label><input type="date" id="impFim" value="${em30}"></div></div>
    <p style="font-size:12px;color:var(--txt-2)">Apenas reservas confirmadas (status reservation) serão importadas. Pré-reservas são ignoradas.</p>
  </div>
  <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn blue-s" id="btnImp" onclick="doImportar()"><i class="ti ti-download"></i> Importar</button></div>`);
}
async function doImportar(){
  const start_date=document.getElementById('impInicio')?.value;
  const end_date=document.getElementById('impFim')?.value;
  if(!start_date||!end_date){toast('Defina as datas',false);return}
  const btn=document.getElementById('btnImp');if(btn){btn.innerHTML='<span class="sp" style="width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span> Buscando…';btn.disabled=true}
  try{
    const r=await POST('/api/v1/clientes/importar',{start_date,end_date});
    closeModal();toast(`${r.total} hóspede(s) importado(s)`);await vClientes();
  }catch(e){toast('Erro: '+e.message,false);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-download"></i> Importar'}}
}

async function abrirCliente(id){
  const c=S.clientes.find(x=>x.id===id);if(!c)return;
  openModal(`<div class="modal-h"><div class="ic" style="background:${avColor(c.nome)};color:#fff">${initials(c.nome)}</div>
    <div><h3>${c.nome}</h3><p>${c.qualificacao||c.canal} · ${c.acomodacao||''}</p></div><span class="x" onclick="closeModal()"><i class="ti ti-x"></i></span></div>
  <div class="modal-b">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Check-in</div><b style="color:#fff">${fmtData(c.check_in)}</b></div>
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Check-out</div><b style="color:#fff">${fmtData(c.check_out)}</b></div>
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Noites</div><b style="color:#fff">${c.noites||'—'}</b></div>
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Pessoas</div><b style="color:#fff">${c.pessoas||'—'}</b></div>
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Receita</div><b style="color:var(--green)">${brlCents(c.receita_cents)}</b></div>
      <div class="info-blk" style="border:none;padding:0"><div class="il2">Canal</div><b style="color:#fff">${c.canal}</b></div>
    </div>
    <div class="fld"><label>WhatsApp ${c.phone?'':'(preencha para enviar boas-vindas)'}</label><input id="cliPhone" value="${c.phone||''}" placeholder="5573999999999"></div>
    <div style="display:flex;align-items:center;gap:9px;padding:10px;background:var(--surf-2);border-radius:9px;margin-top:6px">
      <i class="ti ti-robot" style="font-size:18px;color:var(--purple)"></i>
      <span style="flex:1;font-size:12.5px">Boas-vindas automática ao chegar a data</span>
      <span class="switch ${c.auto_boas_vindas?'':'off'}" onclick="toggleAutoBV(${c.id},this)"></span>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn ghost" style="color:var(--red);border-color:var(--red-soft)" onclick="deleteCliente(${c.id})"><i class="ti ti-trash"></i> Apagar</button>
    <button class="btn ghost" onclick="salvarPhone(${c.id})"><i class="ti ti-device-floppy"></i> Salvar</button>
    <button class="btn blue-s" onclick="enviarBoasVindas(${c.id})"><i class="ti ti-send-2"></i> Enviar boas-vindas</button>
  </div>`);
}
async function salvarPhone(id){
  const phone=document.getElementById('cliPhone')?.value?.trim();
  await PATCH(`/api/v1/clientes/${id}`,{phone}).catch(e=>toast(e.message,false));
  closeModal();toast('Telefone salvo');await vClientes();
}
async function toggleAutoBV(id,el){
  const on=el.classList.contains('off');
  el.classList.toggle('off');
  await PATCH(`/api/v1/clientes/${id}`,{auto_boas_vindas:on}).catch(()=>null);
  toast(on?'Boas-vindas automática ativada':'Boas-vindas automática desativada');
}
async function enviarBoasVindas(id){
  const c=S.clientes.find(x=>x.id===id);
  const phoneInput=document.getElementById('cliPhone');
  if(phoneInput&&phoneInput.value.trim()&&(!c||c.phone!==phoneInput.value.trim())){
    await PATCH(`/api/v1/clientes/${id}`,{phone:phoneInput.value.trim()}).catch(()=>null);
  }
  if(!confirm('Enviar mensagem de boas-vindas para este hóspede agora?'))return;
  try{
    await POST(`/api/v1/clientes/${id}/boas-vindas`);
    closeModal();toast('Boas-vindas enviada');await vClientes();
  }catch(e){toast('Erro: '+e.message,false)}
}
async function deleteCliente(id){
  if(!confirm('Apagar este cliente do CRM? (não afeta o PMS)'))return;
  await api('DELETE',`/api/v1/clientes/${id}`).catch(e=>toast(e.message,false));
  closeModal();toast('Cliente apagado');await vClientes();
}

async function vConfig(){
  document.getElementById('main').innerHTML=`<div class="view active">
  <div class="head"><div><h1>Configurações</h1><div class="sub">Integrações e régua de automação</div></div></div>
  <div class="pad">
    <div class="g2" style="align-items:start">
      <div>
        <div class="card cpad" style="margin-bottom:14px">
          <h2 style="font-size:16px;margin-bottom:5px">Régua de automação</h2>
          <p style="font-size:12.5px;color:var(--txt-2);margin-bottom:4px">Quanto do atendimento a IA conduz sozinha.</p>
          <div class="strack" id="strack"><div class="sfill" id="sfill" style="width:${S.automPct}%"></div><div class="sknob" id="sknob" style="left:${S.automPct}%"><div class="sval" id="sval">${S.automPct}%</div></div></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt-3);margin-bottom:14px"><span>0% manual</span><span>100% IA</span></div>
          <div id="reguaTxt" style="padding:12px;background:var(--blue-soft);border:1px solid #233859;border-radius:9px;font-size:12.5px;color:#9db4d6;line-height:1.6"></div>
        </div>
        <div class="card cpad">
          <h2 style="font-size:15px;margin-bottom:12px">Integrações</h2>
          ${[['ti-brand-whatsapp','WhatsApp (Z-API)','Conectado','var(--wa)',true],['ti-sparkles','Claude API','Conectado · Opus 4.8','var(--blue)',true],['ti-building-cottage','Hospedin PMS','Conectado','var(--teal)',true],['ti-cash','Pagamento','Não conectado','var(--txt-3)',false]].map(i=>`<div class="integ"><div class="lg" style="background:${i[3]}"><i class="ti ${i[0]}"></i></div><div class="id"><b>${i[1]}</b><span>${i[2]}</span></div>${i[4]?'<span class="tag green dot">Ativo</span>':'<button class="btn blue sm">Conectar</button>'}</div>`).join('')}
        </div>
      </div>
      <div class="card cpad">
        <h2 style="font-size:15px;margin-bottom:12px">API aberta do CRM</h2>
        <div style="font-family:monospace;font-size:12px;color:var(--teal);background:var(--bg-2);padding:14px;border-radius:9px;line-height:2">
          <div><span style="color:var(--amber)">POST</span> /api/v1/agent/run</div>
          <div><span style="color:var(--amber)">POST</span> /api/v1/automations/generate</div>
          <div><span style="color:var(--amber)">GET</span> /api/v1/leads</div>
          <div><span style="color:var(--amber)">GET</span> /api/v1/conversations</div>
          <div><span style="color:var(--amber)">POST</span> /webhooks/whatsapp</div>
        </div>
        <div style="margin-top:13px"><label style="font-size:11px;color:var(--txt-3);display:block;margin-bottom:6px">URL DO BACKEND</label>
          <div style="display:flex;gap:8px"><input value="${API_URL}" readonly style="flex:1;height:36px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;padding:0 11px;font-family:monospace;font-size:11.5px;color:var(--txt-2)"><button class="ibtn" onclick="navigator.clipboard.writeText('${API_URL}');toast('URL copiada')"><i class="ti ti-copy"></i></button></div>
        </div>
      </div>
    </div>
  </div></div>`;
  bindSlider();
}
function reguaTxt(p){return `<b style="color:#fff">${p}% conduzido pela IA</b><br>${p<100?`Os ${100-p}% restantes vão para atendimento humano.`:'Tudo em piloto automático.'}`}
function bindSlider(){
  const track=document.getElementById('strack');const t=document.getElementById('reguaTxt');if(t)t.innerHTML=reguaTxt(S.automPct);
  if(!track)return;const fill=document.getElementById('sfill'),knob=document.getElementById('sknob'),val=document.getElementById('sval');let drag=false;
  function set(e){const r=track.getBoundingClientRect();let x=((e.touches?e.touches[0].clientX:e.clientX)-r.left)/r.width;x=Math.max(0,Math.min(1,x));const p=Math.round(x*100);S.automPct=p;fill.style.width=p+'%';knob.style.left=p+'%';val.textContent=p+'%';if(t)t.innerHTML=reguaTxt(p)}
  knob.addEventListener('mousedown',()=>drag=true);track.addEventListener('click',set);
  window.addEventListener('mousemove',e=>{if(drag)set(e)});window.addEventListener('mouseup',()=>drag=false);
}
</script>
